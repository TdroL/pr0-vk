#pragma once

#include <vector>
#include <algorithm>
#include <functional>
#include <type_traits>

namespace util {

template<typename T, typename U>
std::vector<T> pluck(const std::vector<U> &input, const std::function<T(typename std::add_lvalue_reference<typename std::add_const<U>::type>::type)> &callback) {
	std::vector<T> result(input.size());

	std::transform(std::begin(input), std::end(input), std::begin(result), callback);

	return result;
}

} // util